version: '3.8'

services:
  mlflow_db:
    # Use a standard, stable PostgreSQL version
    image: postgres:14-alpine
    container_name: mlflow_postgres
    # Maps the container port to your local machine (5432)
    ports:
      - "5432:5432"
    environment:
      # CRITICAL: These are the credentials you will use in your URI
      POSTGRES_USER: mlflow_user
      POSTGRES_PASSWORD: mlflow_password
      POSTGRES_DB: mlflow_tracking
    # Ensures data persists even if the container is stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: